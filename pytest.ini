[pytest]
testpaths = tests
python_files = test_*.py
python_classes = *Tests
python_functions = test_*
addopts = -ra
markers =
    fast: quick regression coverage with minimal Qt interaction
    ui: Qt-heavy page and widget regressions
    data: dataset, metadata, datacard, and eBUS flows
    analysis: analysis context, plotting, and analysis-page behavior
    core: general non-UI application behavior
